name: Rust TDS Lib ${{parameters.buildType}}
trigger: 
- main

parameters:
- name: buildType
  displayName: Type of the build to produce
  type: string
  values:
  - Both
  - Debug
  - Release
  default: Both

stages:
- stage: Build
  displayName: Build Stage
  jobs:
  - job: Build_Windows
    displayName: Build Windows
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-Win22-Sql22
    variables:
      # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
      CARGO_TARGET_DIR: C:\cargo_target_dir
    steps:
      - template: templates/sql-setup-template.yml
        parameters:
          buildTarget: Windows
      - template: templates/install-dependencies.yml
        parameters:
          osType: Windows
      - template: templates/build-template.yml
        parameters:
          osType: Windows
          buildType: ${{ parameters.buildType }}
          testFilter: -E "not (test(connectivity))"

  # - job: Build_Windows_Arm
  #   displayName: Build Windows ARM
  #   pool:
  #     name: RUST-1ES-POOL-ARM-WUS3
  #     demands:
  #       - imageOverride -equals ADO-WIN11-ARM64
  #   variables:
  #     # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
  #     CARGO_TARGET_DIR: C:\cargo_target_dir
  #   steps:
  #     - template: templates/sql-setup-template.yml
  #       parameters:
  #         buildTarget: Windows
  #     - template: templates/build-template.yml
  #       parameters:
  #         osType: Windows
  #         buildType: ${{ parameters.buildType }}

  - job: Build_Linux
    displayName: Build Linux
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBU
    variables:
      # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: templates/sql-setup-template.yml
        parameters:
          buildTarget: Linux
      - template: templates/install-dependencies.yml
        parameters:
          osType: Linux
      - template: templates/build-template.yml
        parameters:
          osType: Linux
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(connectivity))'

  - job: Build_Linux_ARM
    displayName: Build Linux ARM
    pool:
      name: RUST-1ES-POOL-ARM-WUS3
      demands:
        - imageOverride -equals RUST-UBUNTU-ARM64
    variables:
      # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: templates/install-dependencies.yml
        parameters:
          osType: Linux
      - template: templates/build-template.yml
        parameters:
          osType: Linux
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(query_processing_driver) | test(query_result) | test(connectivity) | test(transaction) | test(rpc_results) | test(timeout))'

  - job: Build_MacOS
    displayName: Build MacOS
    pool:
      name: Azure Pipelines
      vmImage: macOS-latest
    variables:
      # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: templates/sql-setup-template.yml
        parameters:
          buildTarget: MacOS
      - template: templates/install-dependencies.yml
        parameters:
          osType: MacOS
      - template: templates/build-template.yml
        parameters:
          osType: MacOS
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(query_result) | test(connectivity) | test(transaction) | test(rpc_results) | test(timeout))'

- stage: Test
  condition: ne(variables['Build.Reason'], 'PullRequest')
  displayName: Test Stage
  jobs:
    - job: Test_Matrix
      displayName: Linux x64 image.
      strategy:
        matrix:
          DebianBookworm:
            container: debian:bookworm
            entry: deb-bookworm.sh
          AzLinux3:
            container: mcr.microsoft.com/azurelinux/base/core:3.0
            entry: azlinux3.sh
          RHEL9:
            container: redhat/ubi9:latest
            entry: rhel.sh
          OracleLinux9:
            container: oraclelinux:9
            entry: rhel.sh
          SLES15:
            container: registry.suse.com/suse/sle15
            entry: sles.sh
      pool:
        name: RUST-1ES-POOL-WUS3
        demands:
          - imageOverride -equals RUST-1ES-UBU
      steps:
        - task: DockerInstaller@0
          inputs:
            dockerVersion: '17.09.0-ce'
        - task: DownloadPipelineArtifact@2
          inputs:
            buildType: 'current'
            artifactName: 'Build_Linux'
            # targetPath: '$(Build.SourcesDirectory)/artifacts'
          displayName: 'Download Pipeline Artifacts'
        - script: |
            echo $(container)
            echo $(entry)
            echo $container
            if command -v docker >/dev/null 2>&1
            then
              cp $(Pipeline.Workspace)/tdslib-nextest.tar.zst $(Build.SourcesDirectory)
              docker network create testnet
              docker run -e "ACCEPT_EULA=Y" -e "MSSQL_SA_PASSWORD=$(SQL_PASSWORD)" -p 1433:1433 --hostname sql1 --network testnet -d mcr.microsoft.com/mssql/server:2022-latest
              
              docker run --entrypoint bash -v "$PWD:/workspace" -e "DB_USERNAME=sa" -e "DB_HOST=sql1" -e "DB_PORT=1433" -e "SQL_PASSWORD=$(SQL_PASSWORD)" -e "ARCHIVE_NAME=tdslib-nextest.tar.zst" --network testnet $(container) /workspace/scripts/dockerentry/$(entry)
            fi
          workingDirectory: "$(Build.SourcesDirectory)"
          displayName: Run docker test
          condition: succeeded()
          env :
            SQL_PASSWORD: $(SQL_PASSWORD)
        - task: PublishTestResults@2
          condition: succeededOrFailed()
          displayName: "Publish test results"
          inputs:
            testResultsFormat: "JUnit"
            testResultsFiles: $(Build.SourcesDirectory)/target/nextest/ci/junit.xml
            testRunTitle: $(System.PhaseName)


