# Pipeline for build docker images for Rust development containers
# Starter pipeline with two stages

trigger:
- main

stages:
  
  - stage: BuildAndPublish_ARM
    displayName: "Build and Publish (arm64)"
    jobs:
      - job: Build_ARM
        displayName: "Build and Publish Container Images (arm64)"
        pool:
          name: RUST-1ES-POOL-ARM-WUS3
          demands:
            - imageOverride -equals RUST-UBUNTU-ARM64
        steps:
          - template: templates/install-dependencies.yml
            parameters:
              osType: Linux
          - template: templates/install-ubuntu-dependency.yaml
            parameters:
              installAzCli: true

          - template: templates/azure-cli-login-template.yml

          - script: |
              cd containers
              ./buildimages-arm.sh
            displayName: 'Build and publish container images.'

  - stage: BuildAndPublish_X64
    displayName: "Build and Publish (x64)"
    jobs:
      - job: Build_X64
        displayName: "Build and Publish Container Images (x64)"
        pool:
          name: RUST-1ES-POOL-WUS3
          demands:
            - imageOverride -equals RUST-1ES-UBUSLIM
        steps:
          - template: templates/install-ubuntu-dependency.yaml
            parameters:
              installAzCli: true

          - template: templates/azure-cli-login-template.yml

          - script: |
              cd containers
              ./buildimages-x64.sh
            displayName: 'Build and publish container images.'
