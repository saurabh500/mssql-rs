name: Rust TDS Lib ${{parameters.buildType}}
trigger: 
- main
- development

parameters:
- name: buildType
  displayName: Type of the build to produce
  type: string
  values:
  - Both
  - Debug
  - Release
  default: Both

- name: enableFuzzTesting
  displayName: Enable Fuzz Testing
  type: boolean
  default: true

stages:
- stage: Build
  displayName: Build Stage
  jobs:
  - job: Build_Windows
    displayName: Build Windows
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-Win22-Sql25-1P
    variables:
      # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
      CARGO_TARGET_DIR: C:\cargo_target_dir
    steps:
      - template: templates/sql-setup-template.yml
        parameters:
          buildTarget: Windows
      - template: templates/install-dependencies.yml
        parameters:
          osType: Windows
      - template: templates/build-template.yml
        parameters:
          osType: Windows
          buildType: ${{ parameters.buildType }}
          testFilter: -E "not (test(connectivity))"

  # - job: Build_Windows_Arm
  #   displayName: Build Windows ARM
  #   pool:
  #     name: RUST-1ES-POOL-ARM-WUS3
  #     demands:
  #       - imageOverride -equals ADO-WIN11-ARM64
  #   variables:
  #     # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
  #     CARGO_TARGET_DIR: C:\cargo_target_dir
  #   steps:
  #     - template: templates/sql-setup-template.yml
  #       parameters:
  #         buildTarget: Windows
  #     - template: templates/build-template.yml
  #       parameters:
  #         osType: Windows
  #         buildType: ${{ parameters.buildType }}

  - job: Build_Linux
    displayName: Build Linux
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBU
    variables:
      # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: templates/sql-setup-template.yml
        parameters:
          buildTarget: Linux
      - template: templates/install-dependencies.yml
        parameters:
          osType: Linux
      - template: templates/build-template.yml
        parameters:
          osType: Linux
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(connectivity))'
          enableJsBuild: true
          enableJsTest: true

  - job: Build_Linux_ARM
    displayName: Build Linux ARM
    pool:
      name: RUST-1ES-POOL-ARM-WUS3
      demands:
        - imageOverride -equals RUST-UBUNTU-ARM64
    variables:
      # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: templates/install-dependencies.yml
        parameters:
          osType: Linux
      - template: templates/build-template.yml
        parameters:
          osType: Linux
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(query_processing_driver) | test(query_result) | test(connectivity) | test(transaction) | test(rpc_results) | test(timeout_and_cancel) | test(rpc_datatypes) | test(client_based_iterators) | test(connect_fetch_multiple_packets) | test(bulk_copy))'
      - template: templates/build-template-alpine.yml
        parameters:
          osType: Linux
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(connectivity))'
          alpineimagetag: 'tdslibrs.azurecr.io/build/arm64/alpine:3.18'
  - job: Build_Alpine
    displayName: Build Alpine
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBU
    variables:
      # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      # - template: templates/sql-setup-template.yml
      #   parameters:
      #     buildTarget: Linux
      - template: templates/install-ubuntu-dependency.yaml
        parameters:
          installAzCli: true
          installDocker: true
      - template: templates/build-template-alpine.yml
        parameters:
          osType: Linux
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(connectivity))'
  - job: Build_MacOS
    displayName: Build MacOS
    pool:
      name: Azure Pipelines
      vmImage: macOS-latest
    variables:
      # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: templates/sql-setup-template.yml
        parameters:
          buildTarget: MacOS
      - template: templates/install-dependencies.yml
        parameters:
          osType: MacOS 
      - template: templates/build-template.yml
        parameters:
          osType: MacOS
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(query_result) | test(connectivity) | test(transaction) | test(rpc_results) | test(timeout) | test(rpc_datatypes) | test(client_based_iterators) | test(connect_fetch_multiple_packets) | test(bulk_copy))'
          enableJsBuild: true

- stage: Fuzz
  displayName: Fuzz Testing Stage
  dependsOn: Build
  condition: and(succeeded(), eq('${{ parameters.enableFuzzTesting }}', 'true'))
  jobs:
  - job: Fuzz_TokenStream_Linux_PR
    displayName: Fuzz Test Token Stream Linux (PR - 5 min)
    condition: eq(variables['Build.Reason'], 'PullRequest')
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBU
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: templates/install-dependencies.yml
        parameters:
          osType: Linux
      - template: templates/fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_token_stream

  - job: Fuzz_TdsClient_Linux_PR
    displayName: Fuzz Test TdsClient Linux (PR - 5 min)
    condition: eq(variables['Build.Reason'], 'PullRequest')
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBU
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: templates/install-dependencies.yml
        parameters:
          osType: Linux
      - template: templates/fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_tds_client

  - job: Fuzz_TokenStream_Linux_CI
    displayName: Fuzz Test Token Stream Linux (CI - 30 min)
    condition: ne(variables['Build.Reason'], 'PullRequest')
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBU
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: templates/install-dependencies.yml
        parameters:
          osType: Linux
      - template: templates/fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 1800
          fuzzTarget: fuzz_token_stream

  - job: Fuzz_TdsClient_Linux_CI
    displayName: Fuzz Test TdsClient Linux (CI - 30 min)
    condition: ne(variables['Build.Reason'], 'PullRequest')
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBU
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: templates/install-dependencies.yml
        parameters:
          osType: Linux
      - template: templates/fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 1800
          fuzzTarget: fuzz_tds_client

  - job: Fuzz_Additional_Targets_Linux
    displayName: Fuzz Additional Targets Linux (Serial - 5 min each)
    condition: ne(variables['Build.Reason'], 'PullRequest')
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBU
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: templates/install-dependencies.yml
        parameters:
          osType: Linux
      - template: templates/fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_connection_provider
      - template: templates/fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_api_inputs
      - template: templates/fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_parameter_encoding
      - template: templates/fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_connection_provider_network
      - template: templates/fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_connection_provider_context

- stage: Test_alpine
  dependsOn: 
    - Build
    - Fuzz
  condition: ne(variables['Build.Reason'], 'PullRequest')
  displayName: Test Alpine
  jobs:
    - template: templates/test-matrix-template-alpine.yml
      parameters:
        artifactName: 'Build_Alpine'
        matrix:
          Alpine3_18:
            container: tdslibrs.azurecr.io/alpine:3.18
            entry: alpine.sh
          Alpine3_19:
            container: tdslibrs.azurecr.io/alpine:3.19
            entry: alpine.sh
          Alpine3_20:
            container: tdslibrs.azurecr.io/alpine:3.20
            entry: alpine.sh
          Alpine3_21:
            container: tdslibrs.azurecr.io/alpine:3.21
            entry: alpine.sh

- stage: Test_alpine_arm64
  dependsOn: 
    - Build
    - Fuzz
  condition: ne(variables['Build.Reason'], 'PullRequest')
  displayName: Test Alpine arm64
  jobs:
    - template: templates/test-matrix-template-alpine_arm64.yml
      parameters:
        artifactName: 'Build_Linux_ARM'
        poolName: RUST-1ES-POOL-ARM-WUS3
        poolImageOverride: imageOverride -equals RUST-UBUNTU-ARM64
        matrix:
          Alpine3_18:
            container: tdslibrs.azurecr.io/arm64/alpine:3.18
            entry: alpine.sh
          Alpine3_19:
            container: tdslibrs.azurecr.io/arm64/alpine:3.19
            entry: alpine.sh
          Alpine3_20:
            container: tdslibrs.azurecr.io/arm64/alpine:3.20
            entry: alpine.sh
          Alpine3_21:
            container: tdslibrs.azurecr.io/arm64/alpine:3.21
            entry: alpine.sh

- stage: Test_amd64
  dependsOn: 
    - Build
    - Fuzz
  condition: ne(variables['Build.Reason'], 'PullRequest')
  displayName: Test Linux amd64
  jobs:
    - template: templates/test-matrix-template.yml
      parameters:
        matrix:
          DebianBookworm:
            container: tdslibrs.azurecr.io/debian:bookworm
            entry: deb-bookworm.sh
          AzLinux3:
            container: mcr.microsoft.com/azurelinux/base/core:3.0
            entry: azlinux3.sh
          RHEL9:
            container: tdslibrs.azurecr.io/redhat/ubi9:latest
            entry: rhel.sh
          OracleLinux9:
            container: tdslibrs.azurecr.io/oraclelinux:9
            entry: rhel.sh
          SLES15:
            container: registry.suse.com/suse/sle15
            entry: sles.sh
          Ubuntu22:
            container: tdslibrs.azurecr.io/ubuntu:22.04
            entry: deb-bookworm.sh
          Ubuntu24:
            container: tdslibrs.azurecr.io/ubuntu:24.04
            entry: deb-bookworm.sh


- stage: Test_arm64
  dependsOn: 
    - Build
    - Fuzz
  condition: ne(variables['Build.Reason'], 'PullRequest')
  displayName: Test Linux arm64
  jobs:
    - template: templates/test-matrix-template-arm64.yml
      parameters:
        matrix:
          DebianBookworm:
            container: tdslibrs.azurecr.io/arm64/debian:bookworm
            entry: deb-bookworm.sh
          AzLinux3:
            container: mcr.microsoft.com/azurelinux/base/core:3.0
            entry: azlinux3.sh
          RHEL9:
            container: tdslibrs.azurecr.io/arm64/redhat/ubi9:latest
            entry: rhel.sh
          OracleLinux9:
            container: tdslibrs.azurecr.io/arm64/oraclelinux:9
            entry: rhel.sh
          SLES15:
            container: registry.suse.com/suse/sle15
            entry: sles.sh
          Ubuntu22:
            container: tdslibrs.azurecr.io/arm64/ubuntu:22.04
            entry: deb-bookworm.sh
          Ubuntu24:
            container: tdslibrs.azurecr.io/arm64/ubuntu:24.04
            entry: deb-bookworm.sh
