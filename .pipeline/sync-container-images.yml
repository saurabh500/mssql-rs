# Weekly scheduled pipeline to sync Python build images from PyPA to Azure Container Registry
# This ensures we have the latest Python wheel build images available in our internal ACR
# Runs every Monday at 3:00 AM UTC

trigger: none

schedules:
- cron: "0 3 * * 1"
  displayName: Weekly Python image sync (Monday 3 AM UTC)
  branches:
    include:
    - main
    - development
  always: true

pool:
  name: RUST-1ES-POOL-WUS3
  demands:
    - imageOverride -equals RUST-1ES-UBUSLIM

variables:
  ACR_NAME: 'tdslibrs'
  ACR_REGISTRY: 'tdslibrs.azurecr.io'

stages:
- stage: SyncImages
  displayName: Sync Python Build Images
  jobs:
  - job: ImportImages
    displayName: Import Python Build Images to ACR
    steps:
    - checkout: self
      displayName: Checkout repository

    - task: AzureCLI@2
      displayName: 'Sync Python build images to ACR'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'scriptPath'
        scriptPath: '$(Build.SourcesDirectory)/containers/import-python-build-images.sh'
      retryCountOnTaskFailure: 3

    - task: AzureCLI@2
      displayName: 'Verify imported images'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Listing Python build images in ACR..."
          az acr repository list --name $(ACR_NAME) --output table | grep python-build || true
          
          echo ""
          echo "Image details:"
          for image in python-build/manylinux_2_28_x86_64 python-build/manylinux_2_28_aarch64 python-build/musllinux_1_2_x86_64 python-build/musllinux_1_2_aarch64; do
            echo ""
            echo "==> $image"
            az acr repository show-tags --name $(ACR_NAME) --repository $image --output table --orderby time_desc --top 5 || echo "  (not found)"
          done

    - script: |
        echo "Python build image sync completed successfully!"
        echo "Next scheduled sync: Next Monday at 3:00 AM UTC"
      displayName: 'Summary'
