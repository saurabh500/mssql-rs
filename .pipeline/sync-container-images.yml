# =============================================================================
# STAGE 2: Build and Push Custom Images
# Depends on sync stages completing (when importBaseImages is true)
# =============================================================================

- stage: BuildAndPushImages
  displayName: Build and Push Custom Images
  # Depend on sync stages only when importBaseImages is true
  ${{ if eq(parameters.importBaseImages, true) }}:
    dependsOn:
      - Sync_PyPA_Manylinux
      - Sync_PyPA_Musllinux
      - Sync_Ubuntu
      - Sync_Alpine_1
      - Sync_Alpine_2
      - Sync_Debian_RHEL
      - Sync_Oracle
  ${{ else }}:
    dependsOn: []
  condition: or(eq('${{ parameters.buildPythonImages }}', 'true'), eq('${{ parameters.buildUbuntuImages }}', 'true'))
  jobs:
  - job: BuildX64Images
    displayName: Build x64 Images
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    steps:
    - checkout: self
      displayName: Checkout repository

    - task: AzureCLI@2
      displayName: 'Build custom x64 Python build images with Rust pre-installed'
      condition: eq('${{ parameters.buildPythonImages }}', 'true')
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd $(Build.SourcesDirectory)/containers
          
          # Login to ACR
          echo "==> Logging into Azure Container Registry..."
          az acr login --name tdslibrs
          
          # Build manylinux x64 image
          echo "==> Building manylinux x64 image..."
          docker build \
              -f Dockerfile.PythonBuild.manylinux.x64 \
              -t tdslibrs.azurecr.io/python-build/manylinux_2_28_x86_64_rust:latest \
              .
          echo "✅ manylinux x64 image built successfully"
          
          # Build musllinux x64 image
          echo "==> Building musllinux x64 image..."
          docker build \
              -f Dockerfile.PythonBuild.musllinux.x64 \
              -t tdslibrs.azurecr.io/python-build/musllinux_1_2_x86_64_rust:latest \
              .
          echo "✅ musllinux x64 image built successfully"

    - task: AzureCLI@2
      displayName: 'Build Ubuntu x64 build image with Rust and tooling'
      condition: eq('${{ parameters.buildUbuntuImages }}', 'true')
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd $(Build.SourcesDirectory)/containers
          
          # Login to ACR
          echo "==> Logging into Azure Container Registry..."
          az acr login --name tdslibrs
          
          # Build Ubuntu x64 image
          echo "==> Building Ubuntu x64 build image..."
          docker build \
              -f Dockerfile.Ubuntu.Build \
              -t tdslibrs.azurecr.io/build/ubuntu:22.04-x64 \
              -t tdslibrs.azurecr.io/build/ubuntu:latest-x64 \
              .
          echo "✅ Ubuntu x64 build image built successfully"

    - task: AzureCLI@2
      displayName: 'Build Alpine x64 build image with Rust and tooling'
      condition: eq('${{ parameters.buildUbuntuImages }}', 'true')
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd $(Build.SourcesDirectory)/containers
          
          # Login to ACR
          echo "==> Logging into Azure Container Registry..."
          az acr login --name tdslibrs
          
          # Build Alpine x64 image
          echo "==> Building Alpine x64 build image..."
          docker build \
              -f Dockerfile.Alpine.Build \
              -t tdslibrs.azurecr.io/build/alpine:3.18-amd64 \
              .
          echo "✅ Alpine x64 build image built successfully"

    - task: AzureCLI@2
      displayName: 'Push x64 images to ACR'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name tdslibrs
          
          # Push Python images if enabled
          if [ "${{ parameters.buildPythonImages }}" == "True" ]; then
            docker push tdslibrs.azurecr.io/python-build/manylinux_2_28_x86_64_rust:latest
            docker push tdslibrs.azurecr.io/python-build/musllinux_1_2_x86_64_rust:latest
          fi
          
          # Push Ubuntu images if enabled
          if [ "${{ parameters.buildUbuntuImages }}" == "True" ]; then
            docker push tdslibrs.azurecr.io/build/ubuntu:22.04-x64
            docker push tdslibrs.azurecr.io/build/ubuntu:latest-x64
            docker push tdslibrs.azurecr.io/build/alpine:3.18-amd64
          fi

  - job: BuildARM64Images
    displayName: Build ARM64 Images
    dependsOn: BuildX64Images
    pool:
      name: RUST-1ES-POOL-ARM-WUS3
      demands:
        - imageOverride -equals RUST-UBUNTU-ARM64
    steps:
    - checkout: self
      displayName: Checkout repository

    - task: DockerInstaller@0
      displayName: 'Install Docker'
      inputs:
        dockerVersion: '29.0.0'

    - template: templates/install-ubuntu-dependency.yaml
      parameters:
        installAzCli: false
        installDocker: true

    - task: AzureCLI@2
      displayName: 'Build custom ARM64 Python build images with Rust pre-installed'
      condition: eq('${{ parameters.buildPythonImages }}', 'true')
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd $(Build.SourcesDirectory)/containers
          
          # Login to ACR
          echo "==> Logging into Azure Container Registry..."
          az acr login --name tdslibrs
          
          # Build manylinux ARM64 image
          echo "==> Building manylinux ARM64 image..."
          docker build \
              -f Dockerfile.PythonBuild.manylinux.arm64 \
              -t tdslibrs.azurecr.io/python-build/manylinux_2_28_aarch64_rust:latest \
              .
          echo "✅ manylinux ARM64 image built successfully"
          
          # Build musllinux ARM64 image
          echo "==> Building musllinux ARM64 image..."
          docker build \
              -f Dockerfile.PythonBuild.musllinux.arm64 \
              -t tdslibrs.azurecr.io/python-build/musllinux_1_2_aarch64_rust:latest \
              .
          echo "✅ musllinux ARM64 image built successfully"

    - task: AzureCLI@2
      displayName: 'Build Ubuntu ARM64 build image with Rust and tooling'
      condition: eq('${{ parameters.buildUbuntuImages }}', 'true')
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd $(Build.SourcesDirectory)/containers
          
          # Login to ACR
          echo "==> Logging into Azure Container Registry..."
          az acr login --name tdslibrs
          
          # Build Ubuntu ARM64 image
          echo "==> Building Ubuntu ARM64 build image..."
          docker build \
              -f Dockerfile.Ubuntu.Build \
              -t tdslibrs.azurecr.io/build/ubuntu:22.04-arm64 \
              -t tdslibrs.azurecr.io/build/ubuntu:latest-arm64 \
              .
          echo "✅ Ubuntu ARM64 build image built successfully"

    - task: AzureCLI@2
      displayName: 'Build Alpine ARM64 build image with Rust and tooling'
      condition: eq('${{ parameters.buildUbuntuImages }}', 'true')
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd $(Build.SourcesDirectory)/containers
          
          # Login to ACR
          echo "==> Logging into Azure Container Registry..."
          az acr login --name tdslibrs
          
          # Build Alpine ARM64 image
          echo "==> Building Alpine ARM64 build image..."
          docker build \
              -f Dockerfile.Alpine.Build \
              -t tdslibrs.azurecr.io/build/alpine:3.18-arm64 \
              .
          echo "✅ Alpine ARM64 build image built successfully"

    - task: AzureCLI@2
      displayName: 'Push ARM64 images to ACR'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name tdslibrs
          
          # Push Python images if enabled
          if [ "${{ parameters.buildPythonImages }}" == "True" ]; then
            docker push tdslibrs.azurecr.io/python-build/manylinux_2_28_aarch64_rust:latest
            docker push tdslibrs.azurecr.io/python-build/musllinux_1_2_aarch64_rust:latest
          fi
          
          # Push Ubuntu images if enabled
          if [ "${{ parameters.buildUbuntuImages }}" == "True" ]; then
            docker push tdslibrs.azurecr.io/build/ubuntu:22.04-arm64
            docker push tdslibrs.azurecr.io/build/ubuntu:latest-arm64
            docker push tdslibrs.azurecr.io/build/alpine:3.18-arm64
          fi

  - job: CreateMultiArchManifests
    displayName: Create Multi-Arch Manifests
    dependsOn:
    - BuildX64Images
    - BuildARM64Images
    condition: eq('${{ parameters.buildUbuntuImages }}', 'true')
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    steps:
    - checkout: none

    - task: AzureCLI@2
      displayName: 'Create multi-arch manifest for Ubuntu build image'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          az acr login --name tdslibrs
          
          echo "==> Creating multi-arch manifest for Ubuntu 22.04 build image..."
          # Use buildx imagetools create to properly handle manifest lists as inputs
          docker buildx imagetools create -t tdslibrs.azurecr.io/build/ubuntu:22.04 \
            tdslibrs.azurecr.io/build/ubuntu:22.04-x64 \
            tdslibrs.azurecr.io/build/ubuntu:22.04-arm64
          
          echo "✅ Multi-arch Ubuntu build image created"
          echo "   Image: tdslibrs.azurecr.io/build/ubuntu:22.04 (amd64, arm64)"
          
          echo "==> Verifying manifest..."
          docker manifest inspect tdslibrs.azurecr.io/build/ubuntu:22.04

    - task: AzureCLI@2
      displayName: 'Create multi-arch manifest for Alpine build image'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          az acr login --name tdslibrs
          
          echo "==> Creating multi-arch manifest for Alpine 3.18 build image..."
          # Use buildx imagetools create to properly handle manifest lists as inputs
          docker buildx imagetools create -t tdslibrs.azurecr.io/build/alpine:3.18 \
            tdslibrs.azurecr.io/build/alpine:3.18-amd64 \
            tdslibrs.azurecr.io/build/alpine:3.18-arm64
          
          echo "✅ Multi-arch Alpine build image created"
          echo "   Image: tdslibrs.azurecr.io/build/alpine:3.18 (amd64, arm64)"
          
          echo "==> Verifying manifest..."
          docker manifest inspect tdslibrs.azurecr.io/build/alpine:3.18

  - job: VerifyAllImages
    displayName: Verify All Images in ACR
    dependsOn:
    - BuildX64Images
    - BuildARM64Images
    - CreateMultiArchManifests
    condition: always()
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    steps:
    - checkout: none

    - task: AzureCLI@2
      displayName: 'Verify all images in ACR'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "======================================================"
          echo "Listing all Python build images in ACR"
          echo "======================================================"
          az acr repository list --name $(ACR_NAME) --output table | grep python-build || true
          
          echo ""
          echo "======================================================"
          echo "Vanilla PyPA Base Images:"
          echo "======================================================"
          for image in python-build/manylinux_2_28_x86_64 python-build/manylinux_2_28_aarch64 python-build/musllinux_1_2_x86_64 python-build/musllinux_1_2_aarch64; do
            echo ""
            echo "==> $image"
            az acr repository show-tags --name $(ACR_NAME) --repository $image --output table --orderby time_desc --top 3 || echo "  (not found)"
          done
          
          echo ""
          echo "======================================================"
          echo "Custom Images with Rust Pre-installed (Recommended):"
          echo "======================================================"
          for image in python-build/manylinux_2_28_x86_64_rust python-build/manylinux_2_28_aarch64_rust python-build/musllinux_1_2_x86_64_rust python-build/musllinux_1_2_aarch64_rust; do
            echo ""
            echo "==> $image"
            az acr repository show-tags --name $(ACR_NAME) --repository $image --output table --orderby time_desc --top 3 || echo "  (not found)"
          done
          
          echo ""
          echo "======================================================"
          echo "Ubuntu Build Images:"
          echo "======================================================"
          echo ""
          echo "==> build/ubuntu"
          az acr repository show-tags --name $(ACR_NAME) --repository build/ubuntu --output table --orderby time_desc --top 5 || echo "  (not found)"
          
          echo ""
          echo "======================================================"
          echo "Alpine Build Images:"
          echo "======================================================"
          echo ""
          echo "==> build/alpine"
          az acr repository show-tags --name $(ACR_NAME) --repository build/alpine --output table --orderby time_desc --top 5 || echo "  (not found)"
          
          echo ""
          echo "======================================================"
          echo "Imported Base Images:"
          echo "======================================================"
          for repo in import/ubuntu import/alpine import/debian import/redhat/ubi9 import/oraclelinux; do
            echo ""
            echo "==> $repo"
            az acr repository show-tags --name $(ACR_NAME) --repository $repo --output table --orderby time_desc --top 5 2>/dev/null || echo "  (not found)"
          done

    - script: |
        echo ""
        echo "======================================================"
        echo "All build images updated successfully"
        echo "======================================================"
        echo ""
        echo "Available images in ACR:"
        echo "  Vanilla PyPA base images:"
        echo "    - $(ACR_REGISTRY)/python-build/manylinux_2_28_x86_64:latest"
        echo "    - $(ACR_REGISTRY)/python-build/manylinux_2_28_aarch64:latest"
        echo "    - $(ACR_REGISTRY)/python-build/musllinux_1_2_x86_64:latest"
        echo "    - $(ACR_REGISTRY)/python-build/musllinux_1_2_aarch64:latest"
        echo ""
        echo "  Custom images with Rust (RECOMMENDED FOR CI/CD):"
        echo "    - $(ACR_REGISTRY)/python-build/manylinux_2_28_x86_64_rust:latest"
        echo "    - $(ACR_REGISTRY)/python-build/manylinux_2_28_aarch64_rust:latest"
        echo "    - $(ACR_REGISTRY)/python-build/musllinux_1_2_x86_64_rust:latest"
        echo "    - $(ACR_REGISTRY)/python-build/musllinux_1_2_aarch64_rust:latest"
        echo ""
        echo "  Ubuntu build images (RECOMMENDED FOR GENERAL BUILDS):"
        echo "    - $(ACR_REGISTRY)/build/ubuntu:22.04 (multi-arch: amd64, arm64)"
        echo "    - $(ACR_REGISTRY)/build/ubuntu:22.04-x64"
        echo "    - $(ACR_REGISTRY)/build/ubuntu:latest-x64"
        echo "    - $(ACR_REGISTRY)/build/ubuntu:22.04-arm64"
        echo "    - $(ACR_REGISTRY)/build/ubuntu:latest-arm64"
        echo ""
        echo "  Alpine build images (RECOMMENDED FOR MUSL/STATIC BUILDS):"
        echo "    - $(ACR_REGISTRY)/build/alpine:3.18 (multi-arch: amd64, arm64)"
        echo ""
        echo "  Imported base images (from public registries):"
        echo "    - $(ACR_REGISTRY)/import/ubuntu:22.04, 24.04"
        echo "    - $(ACR_REGISTRY)/import/alpine:3.18, 3.19, 3.20, 3.21"
        echo "    - $(ACR_REGISTRY)/import/debian:bookworm"
        echo "    - $(ACR_REGISTRY)/import/redhat/ubi9:latest"
        echo "    - $(ACR_REGISTRY)/import/oraclelinux:9"
        echo ""
        echo "Next scheduled build: Next Monday at 3:00 AM UTC"
      displayName: 'Summary'
