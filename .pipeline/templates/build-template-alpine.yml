parameters:
- name: osType  # defaults for any parameters that aren't specified
  default: Windows
  type: string
  values:
  - Windows
  - Linux
  - MacOS

- name: buildType
  displayName: Type of the build to produce
  type: string
  values:
  - Both
  - Debug
  - Release
  default: Both

- name: testFilter
  displayName: Optional Filter for tests
  type: string
  default: ''

- name: alpineimagetag
  displayName: Alpine Image Tag
  type: string
  default: 'tdslibrs.azurecr.io/alpine:3.18'

steps:

- script: |
    echo "##vso[task.setvariable variable=ARCHIVE_NAME;isOutput=false]tdslib-nextest-musl.tar.zst"
    
  displayName: Archive file name set
  condition: succeeded()
- template: azure-cli-login-template.yml

- script: |
    az acr login -n tdslibrs
    docker run -v "$PWD:/workspace" -e "ARCHIVE_NAME=tdslib-nextest-musl.tar.zst" ${{ parameters.alpineimagetag }} /workspace/scripts/dockerentry/alpine-build.sh
    cp tdslib-nextest-musl.tar.zst $(Build.ArtifactStagingDirectory)
  displayName: Rust Alpine container build
  condition: succeeded()

- task: PublishBuildArtifacts@1
  displayName: Publish Build Drop
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: $(System.PhaseName)
    publishLocation: Container
