parameters:
- name: osType  # defaults for any parameters that aren't specified
  default: Windows
  type: string
  values:
  - Windows
  - Linux
  - MacOS

- name: installdepsparams
  displayName: Install dependencies parameters
  type: string
  default: ''
 
steps:
- ${{ if eq(parameters.osType, 'Linux') }}:
  - script: |
      # This causes unexpected failures in APT package installation.
      sudo systemctl disable unattended-upgrades
    displayName: "Disable unattended upgrades"

  - script: |
      scripts/install-deps.sh ${{ parameters.installdepsparams }}
      # This is a workaround for the fact that the PATH variable is not updated in the same shell.
      echo "##vso[task.setvariable variable=PATH;isOutput=false]$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
    displayName: "Install linux dependencies"

  - script: |
      # This is a workaround for the fact that the PATH variable is not updated in the same shell.
      echo "##vso[task.setvariable variable=PATH;isOutput=false]$HOME/.local/share/fnm:$PATH"
      scripts/install-jsdeps.sh
    displayName: "Install JS dependencies"

  - script: |
      docker ps
    displayName: "Test Docker installation"

- ${{ if eq(parameters.osType, 'MacOS') }}:
  - script: |
      python --version
      pip --version && pip install pipenv
      if [ -z "$PYTHON_HOME" ]; then
        export PYTHON_HOME=$(python -c "import sys; print(sys.prefix)")
      fi
      echo $PYTHON_HOME
      if ! command -v python &> /dev/null; then
        brew install python
      fi

      # Install Rustup
      scripts/install-rustup.sh
    displayName: "Install MacOS dependencies"

  - script: |
      # Install fnm (Fast Node Manager)
      curl -fsSL https://fnm.vercel.app/install | bash
      # This is a workaround for the fact that the PATH variable is not updated in the same shell.
      echo "##vso[task.setvariable variable=PATH;isOutput=false]$HOME/.local/share/fnm:$PATH"
      export FNM_PATH="$HOME/.local/share/fnm"
      export PATH="$FNM_PATH:$PATH"
      eval "`fnm env`"
      # Install Node.js 20
      fnm install 20
      fnm use 20
      # Install yarn globally
      npm install --global yarn
      # Enable corepack for yarn v4 support
      corepack enable
    displayName: "Install JS dependencies for MacOS"

- ${{ if eq(parameters.osType, 'Windows') }}:
  - task: PowerShell@2
    displayName: "Install Python 3.12 if not installed"
    inputs:
      targetType: 'filePath'
      filePath: '.pipeline/scripts/InstallPython.ps1'
      arguments: '-Version "3.12.*"'

  - task: PowerShell@2
    displayName: 'Install Rustup toolchain '
    condition: and(succeeded(), eq('${{parameters.osType}}', 'Windows'))
    inputs:
      targetType: 'inline'
      script: |
        $URL = "https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe";
        $FileName = [System.IO.Path]::GetFileName($URL)
        $DestinationFile = Join-Path $env:Temp $FileName

        try {
            Write-Host "Downloading rustup from $URL"
            $wc = New-Object -TypeName System.Net.WebClient
            $wc.DownloadFile($URL, $DestinationFile)}
        catch {
            Write-Error -Message "Failed to download rustup: $_.Message"
        }

        try{
            Write-Host "Begin installation of rustup"
            Start-Process "$DestinationFile" -ArgumentList @("-y") -Wait -NoNewWindow
            Write-Host "End installation of rustup"
            
            # Add Cargo bin directory to PATH for subsequent tasks
            $cargoPath = "$env:USERPROFILE\.cargo\bin"
            Write-Host "Adding $cargoPath to PATH for subsequent tasks"
            
            # Update PATH for current session
            $env:Path = "$cargoPath;$env:Path"
            
            # Set Azure DevOps pipeline variable for subsequent tasks
            Write-Host "##vso[task.prependpath]$cargoPath"

            # Verify cargo is accessible
            Start-Sleep -Seconds 2
            & cargo --version
            Write-Host "Cargo is now available"
        }
        catch {
            Write-Host "`nException while installing rustup, Error Message: " $_.Exception.Message
        }

  # - task: PowerShell@2
  #   displayName: 'Install Node.js'
  #   condition: and(succeeded(), eq('${{parameters.osType}}', 'Windows'))
  #   inputs:
  #     targetType: 'inline'
  #     script: |
  #       $Version = "20.19.3"
  #       $InstallLocation = "C:\Program Files\nodejs"
  #       scripts/InstallNode.ps1 -Version $Version -InstallLocation $InstallLocation

  - task: PowerShell@2
    displayName: 'Install Yarn'
    condition: and(succeeded(), eq('${{parameters.osType}}', 'Windows'))
    inputs:
      targetType: 'inline'
      script: |
        $nodeVersion = node -v
        Write-Host "Node.js version: $nodeVersion"
        if (-not (Get-Command yarn -ErrorAction SilentlyContinue)) {
            Write-Host "Installing Yarn..."
            npm install --global yarn
            
            # Refresh PATH to pick up yarn
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")
            
            # Also try to find yarn in npm's global prefix
            $npmPrefix = npm config get prefix
            $yarnPath = Join-Path $npmPrefix "yarn.cmd"
            
            if (Test-Path $yarnPath) {
                Write-Host "Found yarn at: $yarnPath"
                $yarnVersion = & $yarnPath -v
                Write-Host "Yarn version: $yarnVersion"
                Write-Host "##vso[task.prependpath]$npmPrefix"
            } else {
                Write-Host "Trying yarn from refreshed PATH..."
                $yarnVersion = yarn -v
                Write-Host "Yarn version: $yarnVersion"
            }
        } else {
            Write-Host "Yarn is already installed."
            $yarnVersion = yarn -v
            Write-Host "Yarn version: $yarnVersion"
        }

  - task: PowerShell@2
    displayName: 'Verify Yarn installation'
    condition: and(succeeded(), eq('${{parameters.osType}}', 'Windows'))
    inputs:
      targetType: 'inline'
      script: |
        $yarnVersion = yarn -v
        Write-Host "Yarn version: $yarnVersion"