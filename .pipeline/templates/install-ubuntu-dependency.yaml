parameters:
  - name: installAzCli
    type: boolean
    default: false
    displayName: Install Azure CLI
  - name: installDocker
    type: boolean
    default: false
    displayName: Install Docker


steps:
- ${{ if eq(parameters.installAzCli, true) }}:
  - script: |
      if ! command -v az &> /dev/null
      then
          echo "ERROR: Az CLI is expected to be pre-installed in the build image. If this is a developer machine, then install az cli using \`curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash\`"
          exit 1
      else
          echo "Azure CLI is already installed"
      fi
    displayName: Install Az CLI
    condition: succeeded()

- ${{ if eq(parameters.installDocker, true) }}:
  - script: |
      ARCH=$(arch)
      if [ "$ARCH" = "aarch64" ]; then
          export DEBIAN_FRONTEND=noninteractive
          echo "Docker not found, installing..."
          sudo apt-get update
          sudo apt-get install docker.io -y
          sudo usermod -aG docker $USER
          sudo groupadd docker
      fi
      echo "Changing permissions for docker.sock"
      sudo chmod 666 /var/run/docker.sock
    displayName: Install Docker
    condition: succeeded()