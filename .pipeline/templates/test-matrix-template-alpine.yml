# filepath: .pipeline/templates/test-matrix-template.yml
parameters:
  matrix: {}

jobs:
  - job: Test_Matrix
    displayName: Linux amd64 
    strategy:
      matrix: ${{ parameters.matrix }}
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBU
    steps:
      - task: DockerInstaller@0
        inputs:
          dockerVersion: '17.09.0-ce'
      - task: DownloadPipelineArtifact@2
        inputs:
          buildType: 'current'
          artifactName: 'Build_Alpine'
        displayName: 'Download Pipeline Artifacts'
      - template: install-ubuntu-dependency.yaml
        parameters:
          installAzCli: true
        
      - template: azure-cli-login-template.yml

      - script: |
          echo $(container)
          echo $(entry)
          echo $container

          echo '[req]
          default_bits       = 2048
          prompt             = no
          default_md         = sha256
          distinguished_name = dn
          x509_extensions    = ext

          [dn]
          CN = sql1

          [ext]
          subjectAltName = @alt_names

          [alt_names]
          DNS.1 = sql1
          DNS.2 = localhost' >> openssl.cnf
          
          cat openssl.cnf

          openssl req -x509 -nodes -newkey rsa:2048 -keyout mssql.key -out mssql.pem -days 365 -config openssl.cnf

          cp mssql.pem mssql.crt

          cat mssql.crt

          chmod 440 mssql.pem
          chmod 440 mssql.key
          echo '[network]
          tlscert = /etc/ssl/certs/mssql.pem
          tlskey = /etc/ssl/private/mssql.key
          tlsprotocols = 1.2
          forceencryption = 1' >> mssql.conf

          cat mssql.conf
          sudo chown 10001:0 mssql.*

          if command -v docker >/dev/null 2>&1
          then
            cp $(Pipeline.Workspace)/tdslib-nextest-musl.tar.zst $(Build.SourcesDirectory)
            docker network create testnet
            docker run -e "ACCEPT_EULA=Y" -e "MSSQL_SA_PASSWORD=$(SQL_PASSWORD)" -p 1433:1433 --hostname sql1 --network testnet -v $PWD/mssql.conf:/var/opt/mssql/mssql.conf -v $PWD/mssql.pem:/etc/ssl/certs/mssql.pem -v $PWD/mssql.key:/etc/ssl/private/mssql.key -u 0:0 -d mcr.microsoft.com/mssql/server:2022-latest

            docker run -v "$PWD:/workspace" -e "DB_USERNAME=sa" -e "DB_HOST=sql1" -e "DB_PORT=1433" -e "SQL_PASSWORD=$(SQL_PASSWORD)" -e "ARCHIVE_NAME=tdslib-nextest-musl.tar.zst" --network testnet $(container) /workspace/scripts/dockerentry/$(entry)
          fi
        workingDirectory: "$(Build.SourcesDirectory)"
        displayName: Run docker test
        condition: succeeded()
        env :
          SQL_PASSWORD: $(SQL_PASSWORD)
      - task: PublishTestResults@2
        condition: succeededOrFailed()
        displayName: "Publish test results"
        inputs:
          testResultsFormat: "JUnit"
          testResultsFiles: $(Build.SourcesDirectory)/target/nextest/ci/junit.xml
          testRunTitle: $(System.PhaseName)
