# Kerberos authentication test template
# Runs Kerberos/GSSAPI tests using Samba AD DC as the domain controller
#
# ARCHITECTURE (Efficient single-agent approach):
#   1. Start DC + SQL Server once (shared infrastructure)
#   2. Configure Kerberos once
#   3. Loop through client profiles sequentially:
#      - Build & start client
#      - Run tests
#      - Stop client
#   4. Clean up at end
#
# This is much faster than spinning up separate DC+SQL for each distro.
#
# Usage in pipeline:
#   # For PR builds (fast - 2 distros)
#   - template: templates/kerberos-test-template.yml
#     parameters:
#       profiles: ['ubuntu22', 'alpine318']
#
#   # For merge/CI builds (full matrix)  
#   - template: templates/kerberos-test-template.yml
#     parameters:
#       profiles: ['ubuntu22', 'ubuntu24', 'alpine318', 'alpine319', 'alpine320', 'alpine321', 'debian', 'rhel9', 'oracle9']

parameters:
  - name: profiles
    type: object
    default:
      - ubuntu22
      - alpine318
  - name: poolName
    type: string
    default: 'RUST-1ES-POOL-WUS3'
  - name: poolImageOverride
    type: string
    default: 'imageOverride -equals RUST-1ES-UBUSLIM'
  - name: testTimeout
    type: number
    default: 60
  - name: useArchive
    type: boolean
    default: true  # Use pre-built nextest archive for faster tests

jobs:
  - job: Kerberos_Test
    displayName: Kerberos Authentication Tests
    timeoutInMinutes: ${{ parameters.testTimeout }}
    pool:
      name: ${{ parameters.poolName }}
      demands:
        - ${{ parameters.poolImageOverride }}
    
    # Convert profiles array to comma-separated string for bash
    variables:
      profileList: ${{ join(',', parameters.profiles) }}
      useArchive: ${{ parameters.useArchive }}
    
    steps:
      - task: DockerInstaller@0
        inputs:
          dockerVersion: '29.0.0'
      
      - script: |
          # Install docker-compose plugin (required for 'docker compose' command)
          DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
          mkdir -p $DOCKER_CONFIG/cli-plugins
          curl -SL https://github.com/docker/compose/releases/download/v2.32.4/docker-compose-linux-x86_64 -o $DOCKER_CONFIG/cli-plugins/docker-compose
          chmod +x $DOCKER_CONFIG/cli-plugins/docker-compose
          docker compose version
        displayName: 'Install docker-compose plugin'
      
      - template: install-ubuntu-dependency.yaml
        parameters:
          installAzCli: true
          installDocker: true
      
      - template: azure-cli-login-template.yml

      - task: AzureCLI@2
        displayName: 'Login to ACR and pull images'
        inputs:
          azureSubscription: 'Magnitude Test'
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            az acr login -n tdslibrs
            # Pull base images needed for Kerberos tests
            docker pull tdslibrs.azurecr.io/import/debian:bookworm

      # Download nextest archives (for --archive mode)
      # Both glibc and musl archives are in Build_Linux artifact
      - ${{ if eq(parameters.useArchive, true) }}:
        - task: DownloadPipelineArtifact@2
          inputs:
            buildType: 'current'
            artifactName: 'Build_Linux'
          displayName: 'Download nextest archives'
        
        - script: |
            echo "Copying nextest archives to source directory..."
            # glibc archive (for debian, ubuntu, rhel, oracle)
            if [ -f "$(Pipeline.Workspace)/tdslib-nextest.tar.zst" ]; then
              cp "$(Pipeline.Workspace)/tdslib-nextest.tar.zst" "$(Build.SourcesDirectory)/"
              echo "✓ Copied tdslib-nextest.tar.zst"
            fi
            # musl archive (for alpine)
            if [ -f "$(Pipeline.Workspace)/tdslib-nextest-musl.tar.zst" ]; then
              cp "$(Pipeline.Workspace)/tdslib-nextest-musl.tar.zst" "$(Build.SourcesDirectory)/"
              echo "✓ Copied tdslib-nextest-musl.tar.zst"
            fi
            ls -la "$(Build.SourcesDirectory)"/*.tar.zst 2>/dev/null || echo "No archives found"
          displayName: 'Copy nextest archives'

      - script: |
          echo "=============================================="
          echo "Generating test credentials"
          echo "=============================================="
          
          cd kerberos-test
          ./generate-env.sh
          
          if [ ! -f .env ]; then
            echo "ERROR: Failed to generate credentials"
            exit 1
          fi
          echo "✓ Credentials generated"
        displayName: 'Generate credentials'
        workingDirectory: '$(Build.SourcesDirectory)'

      - script: |
          echo "=============================================="
          echo "Building infrastructure containers"
          echo "=============================================="
          
          cd kerberos-test
          
          # Source credentials
          set -a && source .env && set +a
          
          # Build DC and SQL Server (shared by all clients)
          docker compose -f docker-compose-matrix.yml build dc mssql
          
          echo "✓ Infrastructure images built"
        displayName: 'Build infrastructure'
        workingDirectory: '$(Build.SourcesDirectory)'

      - script: |
          echo "=============================================="
          echo "Pre-building all client images"
          echo "Profiles: $(profileList)"
          echo "=============================================="
          
          cd kerberos-test
          set -a && source .env && set +a
          
          # Build all client images in parallel (they share layers)
          IFS=',' read -ra PROFILES <<< "$(profileList)"
          for profile in "${PROFILES[@]}"; do
            echo "Building client: $profile"
            docker compose -f docker-compose-matrix.yml --profile "$profile" build &
          done
          
          # Wait for all builds to complete
          wait
          
          echo "✓ All client images built"
        displayName: 'Build all client images'
        workingDirectory: '$(Build.SourcesDirectory)'

      - script: |
          echo "=============================================="
          echo "Starting Kerberos infrastructure"
          echo "(DC + SQL Server - shared by all clients)"
          echo "=============================================="
          
          cd kerberos-test
          set -a && source .env && set +a
          
          # Start Samba DC and SQL Server
          docker compose -f docker-compose-matrix.yml up -d dc mssql
          
          # Wait for Samba DC to be healthy
          echo "Waiting for Samba AD DC to be healthy..."
          MAX_WAIT=300
          WAITED=0
          while [ $WAITED -lt $MAX_WAIT ]; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' samba-dc 2>/dev/null || echo "not found")
            if [ "$STATUS" = "healthy" ]; then
              echo ""
              echo "✓ Samba AD DC is healthy"
              break
            fi
            echo -n "."
            sleep 5
            WAITED=$((WAITED + 5))
          done
          
          if [ "$STATUS" != "healthy" ]; then
            echo ""
            echo "ERROR: Samba DC failed to become healthy after ${MAX_WAIT}s"
            docker compose -f docker-compose-matrix.yml logs dc
            exit 1
          fi
          
          # Wait for SQL Server to be ready
          echo "Waiting for SQL Server to be ready..."
          MAX_WAIT=120
          WAITED=0
          while [ $WAITED -lt $MAX_WAIT ]; do
            if docker exec mssql-kerberos /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$KERBEROS_SA_PASSWORD" -C -Q "SELECT 1" &>/dev/null; then
              echo ""
              echo "✓ SQL Server is ready"
              break
            fi
            echo -n "."
            sleep 5
            WAITED=$((WAITED + 5))
          done
          
          if [ $WAITED -ge $MAX_WAIT ]; then
            echo ""
            echo "ERROR: SQL Server not responding after ${MAX_WAIT}s"
            docker compose -f docker-compose-matrix.yml logs mssql
            exit 1
          fi
        displayName: 'Start infrastructure (once)'
        workingDirectory: '$(Build.SourcesDirectory)'

      - script: |
          echo "=============================================="
          echo "Configuring Kerberos authentication (once)"
          echo "=============================================="
          
          cd kerberos-test
          ./configure-kerberos.sh
          
          echo "✓ Kerberos configured"
        displayName: 'Configure Kerberos (once)'
        workingDirectory: '$(Build.SourcesDirectory)'

      - script: |
          echo "=============================================="
          echo "Running tests on all client profiles"
          echo "Profiles: $(profileList)"
          echo "=============================================="
          
          cd kerberos-test
          set -a && source .env && set +a
          
          # Create results directory
          mkdir -p test-results
          
          # Track overall status
          FAILED_PROFILES=""
          
          IFS=',' read -ra PROFILES <<< "$(profileList)"
          for profile in "${PROFILES[@]}"; do
            echo ""
            echo "=============================================="
            echo "Testing profile: $profile"
            echo "=============================================="
            
            CONTAINER_NAME="kerberos-client-$profile"
            
            # Start client container (--no-recreate prevents restarting DC/SQL)
            echo "Starting client container..."
            docker compose -f docker-compose-matrix.yml --profile "$profile" up -d --no-recreate
            sleep 5
            
            # Verify container is running
            if ! docker ps --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
              echo "ERROR: Client container $CONTAINER_NAME not running"
              FAILED_PROFILES="$FAILED_PROFILES $profile"
              continue
            fi
            
            # Run tests
            echo "Running Kerberos tests..."
            ARCHIVE_FLAG=""
            if [ "$USE_ARCHIVE" = "true" ]; then
              ARCHIVE_FLAG="--archive"
              echo "Using nextest archive mode"
            fi
            if ./run-kerberos-tests.sh "$profile" --ci $ARCHIVE_FLAG; then
              echo "✓ Tests passed for $profile"
            else
              echo "✗ Tests failed for $profile"
              FAILED_PROFILES="$FAILED_PROFILES $profile"
            fi
            
            # Stop this client (keep DC + SQL running)
            echo "Stopping client $profile..."
            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
            
            echo "----------------------------------------------"
          done
          
          # Report final status
          echo ""
          echo "=============================================="
          echo "Test Summary"
          echo "=============================================="
          
          if [ -n "$FAILED_PROFILES" ]; then
            echo "FAILED profiles:$FAILED_PROFILES"
            exit 1
          else
            echo "All profiles passed!"
          fi
        displayName: 'Run tests on all profiles'
        workingDirectory: '$(Build.SourcesDirectory)'
        env:
          KERBEROS_TEST: '1'
          USE_ARCHIVE: '${{ parameters.useArchive }}'

      # Publish test results for each profile
      - ${{ each profile in parameters.profiles }}:
        - task: PublishTestResults@2
          condition: succeededOrFailed()
          displayName: 'Publish results - ${{ profile }}'
          inputs:
            testResultsFormat: 'JUnit'
            testResultsFiles: 'kerberos-test/test-results/${{ profile }}/junit.xml'
            testRunTitle: 'Kerberos Tests - ${{ profile }}'
            failTaskOnFailedTests: false

      - script: |
          echo "=============================================="
          echo "Collecting logs on failure"
          echo "=============================================="
          
          cd kerberos-test
          
          mkdir -p $(Build.ArtifactStagingDirectory)/logs
          
          docker compose -f docker-compose-matrix.yml logs dc > $(Build.ArtifactStagingDirectory)/logs/samba-dc.log 2>&1 || true
          docker compose -f docker-compose-matrix.yml logs mssql > $(Build.ArtifactStagingDirectory)/logs/mssql.log 2>&1 || true
          
          # Collect any client logs that might exist
          IFS=',' read -ra PROFILES <<< "$(profileList)"
          for profile in "${PROFILES[@]}"; do
            docker compose -f docker-compose-matrix.yml --profile "$profile" logs > $(Build.ArtifactStagingDirectory)/logs/client-$profile.log 2>&1 || true
          done
        displayName: 'Collect logs'
        workingDirectory: '$(Build.SourcesDirectory)'
        condition: failed()

      - task: PublishBuildArtifacts@1
        condition: failed()
        displayName: 'Publish failure logs'
        inputs:
          PathtoPublish: '$(Build.ArtifactStagingDirectory)/logs'
          ArtifactName: 'KerberosTestLogs'

      - script: |
          echo "=============================================="
          echo "Cleaning up"
          echo "=============================================="
          
          cd kerberos-test
          
          # Stop all profiles
          IFS=',' read -ra PROFILES <<< "$(profileList)"
          for profile in "${PROFILES[@]}"; do
            docker compose -f docker-compose-matrix.yml --profile "$profile" down -v 2>/dev/null || true
          done
          
          # Stop infrastructure
          docker compose -f docker-compose-matrix.yml down -v || true
        displayName: 'Cleanup'
        workingDirectory: '$(Build.SourcesDirectory)'
        condition: always()
