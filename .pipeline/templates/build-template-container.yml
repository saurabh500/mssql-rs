parameters:
- name: architecture
  displayName: Architecture
  type: string
  values:
  - x64
  - ARM64
  default: x64

- name: buildType
  displayName: Type of the build to produce
  type: string
  values:
  - Both
  - Debug
  - Release
  default: Both

- name: testFilter
  displayName: Optional Filter for tests
  type: string
  default: ''

- name: enableJsBuild
  displayName: Enable JS Build
  type: boolean
  default: false

- name: enableJsTest
  displayName: Enable JS Test
  type: boolean
  default: false

- name: additionalPythonTestArgs
  displayName: Additional Python Test Arguments
  type: string
  default: ''

steps:
- task: DockerInstaller@0
  inputs:
    dockerVersion: '29.0.0'
  displayName: Install Docker


- template: install-ubuntu-dependency.yaml
  parameters:
    installAzCli: false
    installDocker: true

- script: |
    set -euo pipefail
    WORK_DISK="$(Agent.WorkFolder)"
    DOCKER_DATA_ROOT="$WORK_DISK/.docker-data"
    CONTAINERD_ROOT="$WORK_DISK/.containerd-data"
    echo "Relocating Docker + containerd storage to $WORK_DISK (larger disk)"

    sudo systemctl stop docker docker.socket containerd || true

    # Relocate Docker data-root
    sudo mkdir -p "$DOCKER_DATA_ROOT" /etc/docker
    echo "{\"data-root\": \"$DOCKER_DATA_ROOT\"}" | sudo tee /etc/docker/daemon.json

    # Relocate containerd root (images are stored here, not in Docker data-root)
    sudo mkdir -p "$CONTAINERD_ROOT" /etc/containerd
    sudo containerd config default \
      | sed -E "s|root = ['\"]?/var/lib/containerd['\"]?|root = '$CONTAINERD_ROOT'|" \
      | sudo tee /etc/containerd/config.toml > /dev/null

    sudo systemctl start containerd
    sudo systemctl start docker

    echo "Docker data-root: $(docker info --format '{{.DockerRootDir}}')"
    echo "Containerd root:  $(sudo containerd config dump | grep -m1 -E '^\s*root\s*=' || true)"
    df -h "$WORK_DISK"
  displayName: Relocate Docker storage to work folder disk

- template: azure-cli-login-template.yml

- task: AzureCLI@2
  displayName: Login to ACR and pull build image
  inputs:
    azureSubscription: 'Magnitude Test'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      az acr login --name tdslibrs
      docker pull tdslibrs.azurecr.io/build/ubuntu:22.04

- script: |
    set -euo pipefail
    # Generate Certificate
    bash scripts/generate_cert.sh    
    sudo chown 10001:0 mssql.*

    # Create docker network
    docker network create testnet

    # Start SQL Server
    docker run -e "ACCEPT_EULA=Y" \
      -e "MSSQL_SA_PASSWORD=$(SQL_PASSWORD)" \
      -p 1433:1433 \
      --hostname sql1 \
      --network testnet \
      --name sqlserver \
      -v $PWD/conf/mssql.conf:/var/opt/mssql/mssql.conf \
      -v $PWD/mssql.pem:/etc/ssl/certs/mssql.pem \
      -v $PWD/mssql.key:/etc/ssl/private/mssql.key \
      -u 0:0 \
      -d mcr.microsoft.com/mssql/server:2025-latest

    echo "Waiting for SQL Server to start..."
    sleep 10
  displayName: Setup SQL Server in Docker
  env:
    SQL_PASSWORD: $(SQL_PASSWORD)

- script: |
    BUILD_IMAGE="tdslibrs.azurecr.io/build/ubuntu:22.04"
    
    # Set IS_PR_BUILD flag
    if [ "$(Build.Reason)" = "PullRequest" ]; then
      IS_PR_BUILD="true"
    else
      IS_PR_BUILD="false"
    fi
    
    # Create cargo cache directory if it doesn't exist
    mkdir -p $HOME/.cargo/registry
    mkdir -p $HOME/.cargo/git
    
    # Run build container with access to workspace and SQL network
    bash .pipeline/scripts/docker-cargo-run.sh --rm \
      --network testnet \
      -v $PWD:/workspace \
      -v $HOME/.cargo/registry:/root/.cargo/registry \
      -v $HOME/.cargo/git:/root/.cargo/git \
      -v $PWD/ca.crt:/usr/local/share/ca-certificates/mssql-ca.crt:ro \
      -e SQL_PASSWORD="$(SQL_PASSWORD)" \
      -e DB_HOST="sql1" \
      -e CERT_HOST_NAME="sql1" \
      -e RUST_BACKTRACE=full \
      -e BUILD_TYPE="${{ parameters.buildType }}" \
      -e IS_PR_BUILD="$IS_PR_BUILD" \
      -e TEST_FILTER="${{ parameters.testFilter }}" \
      -w /workspace \
      $BUILD_IMAGE \
      /workspace/.pipeline/scripts/containerized-build.sh
  displayName: Build in Container
  env:
    SQL_PASSWORD: $(SQL_PASSWORD)
    CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN)
    CARGO_REGISTRIES_MSSQL_RS_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_TOKEN)

- script: |
    BUILD_IMAGE="tdslibrs.azurecr.io/build/ubuntu:22.04"
    
    bash .pipeline/scripts/docker-cargo-run.sh --rm \
      -v $PWD:/workspace \
      -v $HOME/.cargo/registry:/root/.cargo/registry \
      -v $HOME/.cargo/git:/root/.cargo/git \
      -w /workspace \
      $BUILD_IMAGE \
      /workspace/.pipeline/scripts/containerized-clippy.sh
  displayName: Run Clippy
  condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))
  env:
    CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN)
    CARGO_REGISTRIES_MSSQL_RS_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_TOKEN)

- script: |
    BUILD_IMAGE="tdslibrs.azurecr.io/build/ubuntu:22.04"
    
    bash .pipeline/scripts/docker-cargo-run.sh --rm \
      -v $PWD:/workspace \
      -v $HOME/.cargo/registry:/root/.cargo/registry \
      -v $HOME/.cargo/git:/root/.cargo/git \
      -w /workspace \
      $BUILD_IMAGE \
      /workspace/.pipeline/scripts/containerized-format.sh
  displayName: Check Format
  condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))
  env:
    CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN)
    CARGO_REGISTRIES_MSSQL_RS_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_TOKEN)

- script: |
    BUILD_IMAGE="tdslibrs.azurecr.io/build/ubuntu:22.04"
    
    bash .pipeline/scripts/docker-cargo-run.sh --rm \
      --network testnet \
      -v $PWD:/workspace \
      -v $HOME/.cargo/registry:/root/.cargo/registry \
      -v $HOME/.cargo/git:/root/.cargo/git \
      -v $PWD/ca.crt:/usr/local/share/ca-certificates/mssql-ca.crt:ro \
      -e SQL_PASSWORD="$(SQL_PASSWORD)" \
      -e DB_HOST="sql1" \
      -e CERT_HOST_NAME="sql1" \
      -e RUST_BACKTRACE=full \
      -w /workspace \
      $BUILD_IMAGE \
      /workspace/.pipeline/scripts/containerized-test.sh ${{ parameters.testFilter }}
  displayName: Run Tests and Coverage
  condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))
  env:
    SQL_PASSWORD: $(SQL_PASSWORD)
    CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN)
    CARGO_REGISTRIES_MSSQL_RS_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_TOKEN)

- task: PublishTestResults@2
  condition: and(succeededOrFailed(), eq(variables['Build.Reason'], 'PullRequest'))
  displayName: Publish test results
  inputs:
    testResultsFormat: JUnit
    testResultsFiles: $(Build.SourcesDirectory)/target/nextest/ci/junit.xml
    testRunTitle: $(System.PhaseName)
    failTaskOnFailedTests: false
    publishRunAttachments: true

- task: PublishCodeCoverageResults@2
  condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))
  displayName: Publish coverage results
  inputs:
    summaryFileLocation: $(Build.SourcesDirectory)/target/lcov.info
    pathToSources: $(Build.SourcesDirectory)

- task: CopyFiles@2
  displayName: Copy Rust Debug Build
  condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'), or(eq('${{parameters.buildType}}', 'Debug'), eq('${{parameters.buildType}}', 'Both')))
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)/target/debug'
    Contents: |
      *
      !.cargo-lock
    TargetFolder: '$(Build.ArtifactStagingDirectory)/debug'

- task: CopyFiles@2
  displayName: Copy Rust Release Build
  condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'), or(eq('${{parameters.buildType}}', 'Release'), eq('${{parameters.buildType}}', 'Both')))
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)/target/release'
    Contents: |
      *
      !.cargo-lock
    TargetFolder: '$(Build.ArtifactStagingDirectory)/release'

- script: |
    if [ -f "$(Build.SourcesDirectory)/tdslib-nextest.tar.zst" ]; then
      cp $(Build.SourcesDirectory)/tdslib-nextest.tar.zst $(Build.ArtifactStagingDirectory)/
      echo "##vso[task.setvariable variable=ARCHIVE_NAME;isOutput=false]tdslib-nextest.tar.zst"
    fi
  displayName: Copy nextest archive
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))

- ${{ if eq(parameters.enableJsBuild, true) }}:
  - script: |
      BUILD_IMAGE="tdslibrs.azurecr.io/build/ubuntu:22.04"
      
      bash .pipeline/scripts/docker-cargo-run.sh --rm \
        -v $PWD:/workspace \
        -v $HOME/.cargo/registry:/root/.cargo/registry \
        -v $HOME/.cargo/git:/root/.cargo/git \
        -w /workspace \
        $BUILD_IMAGE \
        /workspace/.pipeline/scripts/containerized-js-build.sh
    displayName: Build JavaScript bindings
    condition: succeeded()
    env:
      CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN)
      CARGO_REGISTRIES_MSSQL_RS_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_TOKEN)

- ${{ if eq(parameters.enableJsTest, true) }}:
  - script: |
      BUILD_IMAGE="tdslibrs.azurecr.io/build/ubuntu:22.04"
      
      bash .pipeline/scripts/docker-cargo-run.sh --rm \
        --network testnet \
        -v $PWD:/workspace \
        -v $PWD/ca.crt:/usr/local/share/ca-certificates/mssql-ca.crt:ro \
        -e SQL_PASSWORD="$(SQL_PASSWORD)" \
        -e DB_HOST="sql1" \
        -e CERT_HOST_NAME="sql1" \
        -w /workspace \
        $BUILD_IMAGE \
        /workspace/.pipeline/scripts/containerized-js-test.sh
    displayName: Test JavaScript bindings
    condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))
    env:
      SQL_PASSWORD: $(SQL_PASSWORD)
      CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN)
      CARGO_REGISTRIES_MSSQL_RS_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_TOKEN)

  - task: PublishTestResults@2
    condition: and(succeededOrFailed(), eq(variables['Build.Reason'], 'PullRequest'))
    displayName: Publish JS test results
    inputs:
      testResultsFormat: JUnit
      testResultsFiles: $(Build.SourcesDirectory)/mssql-js/junit.xml
      testRunTitle: $(System.PhaseName)-Js

- script: |
    BUILD_IMAGE="tdslibrs.azurecr.io/build/ubuntu:22.04"
    
    bash .pipeline/scripts/docker-cargo-run.sh --rm \
      --network testnet \
      -v $PWD:/workspace \
      -v $PWD/ca.crt:/usr/local/share/ca-certificates/mssql-ca.crt:ro \
      -e SQL_PASSWORD="$(SQL_PASSWORD)" \
      -e DB_HOST="sql1" \
      -e DB_USERNAME="sa" \
      -e SQL_SERVER="sql1" \
      -e SQL_DATABASE="master" \
      -e TRUST_SERVER_CERTIFICATE="true" \
      -w /workspace \
      $BUILD_IMAGE \
      /workspace/.pipeline/scripts/containerized-python-test.sh ${{ parameters.additionalPythonTestArgs }}
  displayName: Test Python bindings (mssql-py-core)
  condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))
  env:
    SQL_PASSWORD: $(SQL_PASSWORD)
    CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN)
    CARGO_REGISTRIES_MSSQL_RS_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_TOKEN)

- task: PublishTestResults@2
  condition: and(succeededOrFailed(), eq(variables['Build.Reason'], 'PullRequest'))
  displayName: Publish Python test results
  inputs:
    testResultsFormat: JUnit
    testResultsFiles: $(Build.SourcesDirectory)/mssql-py-core/pytest-results.xml
    testRunTitle: $(System.PhaseName)-Python

- script: |
    docker stop sqlserver || true
    docker rm sqlserver || true
    docker network rm testnet || true
  displayName: Cleanup Docker resources
  condition: always()
