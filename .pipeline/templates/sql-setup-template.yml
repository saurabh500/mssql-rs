parameters:
- name: buildTarget  # defaults for any parameters that aren't specified
  default: 'Windows'
  type: string
  values:
  - Windows
  - Linux
  - MacOS

steps:
- ${{ if eq(parameters.buildTarget, 'Windows') }}:
  - task: PowerShell@2
    displayName: 'Generate Certificate for TLS encryption '
    inputs:
      targetType: 'inline'
      script: |
        .pipeline/Certificates-Operations.ps1 -instanceName "MSSQLSERVER"

  - task: PowerShell@2
    displayName: 'Setup users in SQL server, restart service and check version'
    inputs:
      targetType: 'inline'
      script: |
        echo "Creating users, setting up test user and restarting SQL server"
        Restart-Service -Name 'MSSQLSERVER' -Force
        
        sqlcmd -Q "ALTER LOGIN sa ENABLE;"
        sqlcmd -Q "ALTER LOGIN sa WITH CHECK_POLICY = OFF, CHECK_EXPIRATION = OFF;"
        sqlcmd -Q "ALTER LOGIN sa WITH PASSWORD = '$(SQL_PASSWORD)'"
        sqlcmd -Q "CREATE LOGIN testuser WITH PASSWORD = '$(SQL_PASSWORD)', CHECK_POLICY = OFF, CHECK_EXPIRATION = OFF;"
        Restart-Service -Name 'MSSQLSERVER' -Force
        sqlcmd -Q "ALTER SERVER ROLE sysadmin ADD MEMBER testuser;"
        sqlcmd -S localhost,1433 -U sa -P $(SQL_PASSWORD) -Q "SELECT @@VERSION"
    env:
      SQL_PASSWORD: $(SQL_PASSWORD)

  - task: PowerShell@2
    displayName: 'Enable SQL Browser service and network protocols'
    inputs:
      targetType: 'inline'
      script: |
        # Check and enable SQL Browser service if not running
        $browserService = Get-Service -Name 'SQLBrowser' -ErrorAction SilentlyContinue
        if ($browserService) {
          if ($browserService.Status -ne 'Running') {
            echo "SQL Browser service is not running. Enabling and starting it..."
            Set-Service -Name 'SQLBrowser' -StartupType Automatic
            Start-Service -Name 'SQLBrowser'
            echo "SQL Browser service started successfully"
          } else {
            echo "SQL Browser service is already running"
          }
        } else {
          echo "SQL Browser service not found on this system"
        }


- ${{ if eq(parameters.buildTarget, 'Linux') }}:
  - task: DockerInstaller@0
    inputs:
      dockerVersion: '17.09.0-ce'

  - script: |
      set -euo pipefail
      # Setup Certificate
      ls /var/run/docker.sock
      sudo chmod 666 /var/run/docker.sock
      scripts/generate_cert.sh    
      sudo chown 10001:0 mssql.*

      docker network create testnet

      # Todo move away from Root container.

      docker run -e "ACCEPT_EULA=Y" -e "MSSQL_SA_PASSWORD=$(SQL_PASSWORD)" -p 1433:1433 --hostname sql1 --network testnet -v $PWD/conf/mssql.conf:/var/opt/mssql/mssql.conf -v $PWD/mssql.pem:/etc/ssl/certs/mssql.pem -v $PWD/mssql.key:/etc/ssl/private/mssql.key -u 0:0 -d mcr.microsoft.com/mssql/server:2025-latest

    displayName: "Run SQL in docker"   
    env:
      SQL_PASSWORD: $(SQL_PASSWORD)

  - script: |
      sudo cp ca.crt /usr/local/share/ca-certificates

      sudo update-ca-certificates

      echo $?
      sudo openssl verify -CAfile /etc/ssl/certs/ca-certificates.crt mssql.crt

      # Exit 0 is a workaround since the update-ca-certificates command does not return a non-zero exit code on warning. The warning is typically nascent. 
      exit 0
    displayName: "Update CA certificates on the client"