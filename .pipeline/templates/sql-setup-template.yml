parameters:
- name: buildTarget  # defaults for any parameters that aren't specified
  default: 'Windows'
  type: string
  values:
  - Windows
  - Linux
  - MacOS

steps:
- ${{ if eq(parameters.buildTarget, 'Windows') }}:
  - task: PowerShell@2
    displayName: 'Generate Certificate for TLS encryption '
    inputs:
      targetType: 'filePath'
      filePath: '.pipeline/scripts/Generate-SqlCertificates.ps1'
      arguments: '-InstanceName "MSSQLSERVER"'

  - task: PowerShell@2
    displayName: 'Setup users in SQL server, restart service and check version'
    inputs:
      targetType: 'inline'
      script: |
        echo "Creating users, setting up test user and restarting SQL server"
        Restart-Service -Name 'MSSQLSERVER' -Force
        
        sqlcmd -Q "ALTER LOGIN sa ENABLE;"
        sqlcmd -Q "ALTER LOGIN sa WITH CHECK_POLICY = OFF, CHECK_EXPIRATION = OFF;"
        sqlcmd -Q "ALTER LOGIN sa WITH PASSWORD = '$(SQL_PASSWORD)'"
        sqlcmd -Q "CREATE LOGIN testuser WITH PASSWORD = '$(SQL_PASSWORD)', CHECK_POLICY = OFF, CHECK_EXPIRATION = OFF;"
        Restart-Service -Name 'MSSQLSERVER' -Force
        sqlcmd -Q "ALTER SERVER ROLE sysadmin ADD MEMBER testuser;"
        sqlcmd -S localhost,1433 -U sa -P $(SQL_PASSWORD) -Q "SELECT @@VERSION"
    env:
      SQL_PASSWORD: $(SQL_PASSWORD)

  - task: PowerShell@2
    displayName: 'Setup LocalDB with SA login'
    inputs:
      targetType: 'inline'
      script: |
        echo "Checking if LocalDB runtime is installed..."
        
        # First check if sqluserinstance.dll exists (LocalDB runtime library)
        $sqlServerRoot = "C:\Program Files\Microsoft SQL Server"
        $userInstanceDll = $null
        
        if (Test-Path $sqlServerRoot) {
          $userInstanceDll = Get-ChildItem -Path $sqlServerRoot -Recurse -Filter "sqluserinstance.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
        }
        
        if ($userInstanceDll) {
          echo "LocalDB runtime (sqluserinstance.dll) found at: $($userInstanceDll.FullName)"
          echo "LocalDB API is available - proceeding with direct sqlcmd setup"
          
          # Wait for LocalDB instance to start by attempting connection with retry
          echo "Waiting for LocalDB instance to start..."
          $maxRetries = 10
          $retryCount = 0
          $connected = $false
          
          while ($retryCount -lt $maxRetries -and -not $connected) {
            sqlcmd -S "(localdb)\MSSQLLocalDB" -E -Q "SELECT 1" 2>&1 | Out-Null
            
            if ($LASTEXITCODE -eq 0) {
              $connected = $true
              echo "LocalDB instance is ready"
            } else {
              $retryCount++
              echo "Waiting for instance to start (attempt $retryCount/$maxRetries)..."
              Start-Sleep -Seconds 2
            }
          }
          
          if (-not $connected) {
            echo "Failed to connect to LocalDB instance after $maxRetries attempts"
            exit 1
          }
          
          # Configure SA login
          echo "Configuring SA login with sqlcmd..."
          sqlcmd -S "(localdb)\MSSQLLocalDB" -E -Q "ALTER LOGIN sa ENABLE; ALTER LOGIN sa WITH PASSWORD = '$(SQL_PASSWORD)'; ALTER LOGIN sa WITH CHECK_POLICY = OFF, CHECK_EXPIRATION = OFF;"
          
          if ($LASTEXITCODE -ne 0) {
            echo "Failed to configure SA login with sqlcmd (exit code: $LASTEXITCODE)"
            exit 1
          }
          
          echo "Verifying SA login..."
          sqlcmd -S "(localdb)\MSSQLLocalDB" -U sa -P $(SQL_PASSWORD) -Q "SELECT @@VERSION"
          
          if ($LASTEXITCODE -ne 0) {
            echo "Failed to verify SA login (exit code: $LASTEXITCODE)"
            exit 1
          }
          
          echo "LocalDB setup complete using direct sqlcmd connection"
        } else {
          echo "sqluserinstance.dll not found. Checking for SqlLocalDB.exe..."
          
          $localDbPath = Get-Command SqlLocalDB -ErrorAction SilentlyContinue
          
          if (-not $localDbPath) {
            echo "SqlLocalDB not found on PATH. Searching in Program Files..."
            
            if (Test-Path $sqlServerRoot) {
              $sqlLocalDbExe = Get-ChildItem -Path $sqlServerRoot -Recurse -Filter "SqlLocalDB.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
              
              if ($sqlLocalDbExe) {
                $localDbPath = $sqlLocalDbExe.FullName
                echo "SqlLocalDB found at: $localDbPath"
                
                # Add to PATH for this session
                $env:PATH = "$($sqlLocalDbExe.DirectoryName);$env:PATH"
              } else {
                Write-Error "Neither sqluserinstance.dll nor SqlLocalDB.exe found. LocalDB is required for running tests."
                exit 1
              }
            } else {
              Write-Error "SQL Server directory not found. LocalDB is required for running tests."
              exit 1
            }
          } else {
            echo "SqlLocalDB found at: $($localDbPath.Source)"
          }
          
          # Create MSSQLLocalDB instance if it doesn't exist
          echo "Creating MSSQLLocalDB instance..."
          SqlLocalDB create "MSSQLLocalDB" 2>&1 | Out-Null
          
          # Start the instance
          echo "Starting MSSQLLocalDB instance..."
          SqlLocalDB start "MSSQLLocalDB"
          
          # Get instance info
          echo "LocalDB instance info:"
          SqlLocalDB info "MSSQLLocalDB"
          
          # Enable SA login and set password
          echo "Enabling SA login with password..."
          sqlcmd -S "(localdb)\MSSQLLocalDB" -E -Q "ALTER LOGIN sa ENABLE; ALTER LOGIN sa WITH PASSWORD = '$(SQL_PASSWORD)'; ALTER LOGIN sa WITH CHECK_POLICY = OFF, CHECK_EXPIRATION = OFF;"
          
          # Verify connection with SA
          echo "Verifying SA login..."
          sqlcmd -S "(localdb)\MSSQLLocalDB" -U sa -P $(SQL_PASSWORD) -Q "SELECT @@VERSION"
          
          echo "LocalDB setup complete"
        }
    env:
      SQL_PASSWORD: $(SQL_PASSWORD)

  - task: PowerShell@2
    displayName: 'Enable SQL Browser service'
    inputs:
      targetType: 'filePath'
      filePath: '.pipeline/scripts/Enable-SqlBrowser.ps1'
      arguments: '-ServiceName "SQLBrowser"'

  - task: PowerShell@2
    displayName: 'Enable Named Pipes and Shared Memory protocols'
    inputs:
      targetType: 'filePath'
      filePath: '.pipeline/scripts/Enable-SqlProtocols.ps1'
      arguments: '-InstanceName "MSSQLSERVER" -SqlVersion "MSSQL17" -RestartService $true'

- ${{ if eq(parameters.buildTarget, 'Linux') }}:
  - task: DockerInstaller@0
    inputs:
      dockerVersion: '17.09.0-ce'

  - script: |
      set -euo pipefail
      # Setup Certificate
      ls /var/run/docker.sock
      sudo chmod 666 /var/run/docker.sock
      scripts/generate_cert.sh    
      sudo chown 10001:0 mssql.*

      docker network create testnet

      # Todo move away from Root container.

      docker run -e "ACCEPT_EULA=Y" -e "MSSQL_SA_PASSWORD=$(SQL_PASSWORD)" -p 1433:1433 --hostname sql1 --network testnet -v $PWD/conf/mssql.conf:/var/opt/mssql/mssql.conf -v $PWD/mssql.pem:/etc/ssl/certs/mssql.pem -v $PWD/mssql.key:/etc/ssl/private/mssql.key -u 0:0 -d mcr.microsoft.com/mssql/server:2025-latest

    displayName: "Run SQL in docker"   
    env:
      SQL_PASSWORD: $(SQL_PASSWORD)

  - script: |
      sudo cp ca.crt /usr/local/share/ca-certificates

      sudo update-ca-certificates

      echo $?
      sudo openssl verify -CAfile /etc/ssl/certs/ca-certificates.crt mssql.crt

      # Exit 0 is a workaround since the update-ca-certificates command does not return a non-zero exit code on warning. The warning is typically nascent. 
      exit 0
    displayName: "Update CA certificates on the client"