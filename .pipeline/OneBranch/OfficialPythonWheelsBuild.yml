#################################################################################
#                        OneBranch Pipelines - Official                         #
# Official build pipeline for Python wheels. Builds across all platforms       #
# with SDL enforcement (BinSkim, CredScan, PoliCheck) and approval gates.     #
# This pipeline does NOT publish to any feed — publishing is handled by a      #
# separate Release pipeline.                                                    #
# Documentation:  https://aka.ms/obpipelines                                    #
# Yaml Schema:    https://aka.ms/obpipelines/yaml/schema                        #
# Retail Tasks:   https://aka.ms/obpipelines/tasks                              #
# Support:        https://aka.ms/onebranchsup                                   #
#################################################################################

# No CI or PR triggers — official builds are manual only
trigger: none
pr: none

variables:
  CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)]  # For onebranch.pipeline.version task
  LinuxContainerImage: 'mcr.microsoft.com/onebranch/azurelinux/build:3.0'
  WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2022/vse2022:latest'
  DEBIAN_FRONTEND: noninteractive
  toolchainFeed: 'https://sqlclientdrivers.pkgs.visualstudio.com/mssql-rs/_packaging/mssql-rs/nuget/v3/index.json'

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates
  parameters:
    featureFlags:
      EnableCDPxPAT: false
      WindowsHostVersion: 1ESWindows2022
    globalSdl:
      binskim:
        scanOutputDirectoryOnly: true
      clippy:
        enabled: true
    stages:
    - template: /.pipeline/OneBranch/stages.yml@self
      parameters:
        buildAllTargets: true
        buildPythonWheels: true
        isOfficial: true
