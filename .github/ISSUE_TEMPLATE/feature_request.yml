name: Feature Request
description: Suggest a feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement. Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? What limitation are you hitting?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: dropdown
    id: crate
    attributes:
      label: Affected crate
      options:
        - mssql-tds
        - mssql-js
        - mssql-tds-cli
        - mssql-mock-tds
        - mssql-py-core
        - Not sure / Multiple
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information, references, or screenshots.
    validations:
      required: false
