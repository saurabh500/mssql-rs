[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    longhaul: marks tests as long-haul tests for extended stress testing (deselect with '-m "not longhaul"')
    smoke: marks tests as smoke tests for private-link validation (select with '-m smoke')
